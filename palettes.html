<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palettes — Fortuna Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: #ccc;
      line-height: 1.6;
      padding: 3rem 2rem;
    }

    .page-title {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 2.5rem;
      color: #fff;
      text-align: center;
      margin-bottom: 0.5rem;
      letter-spacing: -0.03em;
    }
    .page-sub {
      text-align: center;
      color: #888;
      font-size: 0.875rem;
      margin-bottom: 3rem;
    }

    .palettes {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .palette {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .palette:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .palette__preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 320px;
    }

    .palette__left {
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .palette__right {
      display: flex;
      flex-direction: column;
    }
    .palette__right-top {
      flex: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.75rem;
    }
    .palette__right-bottom {
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .palette__name {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 1.75rem;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.25rem;
    }
    .palette__tag {
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .palette__hero-text {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 2rem;
      font-weight: 500;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }
    .palette__body-text {
      font-size: 0.8125rem;
      line-height: 1.6;
      opacity: 0.7;
    }

    .palette__card {
      border-radius: 10px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .palette__card-title {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 0.9375rem;
      font-weight: 500;
    }
    .palette__card-text {
      font-size: 0.75rem;
      opacity: 0.6;
    }

    .palette__btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.25rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .palette__btn--secondary {
      padding: 0.6rem 1.25rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
    }

    /* Swatches */
    .palette__swatches {
      display: flex;
      gap: 0;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .swatch {
      flex: 1;
      padding: 1rem 0.75rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }
    .swatch__dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.08);
    }
    .swatch__label {
      font-size: 0.5625rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.5;
    }
    .swatch__hex {
      font-size: 0.625rem;
      font-family: 'Space Grotesk', monospace;
      opacity: 0.7;
    }

    /* Active badge */
    .badge-current {
      display: inline-block;
      font-size: 0.5625rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      background: rgba(232,168,56,0.15);
      color: #e8a838;
      margin-left: 0.75rem;
    }

    /* Apply button */
    .palette__apply {
      display: none;
      margin: 0.75rem 1.25rem 1.25rem;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.6875rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #fff;
      transition: background 0.2s;
      text-align: center;
    }
    .palette:hover .palette__apply { display: block; }
    .palette__apply:hover { background: rgba(255,255,255,0.08); }

    @media (max-width: 700px) {
      .palette__preview { grid-template-columns: 1fr; }
      .palette__swatches { flex-wrap: wrap; }
      .swatch { min-width: 20%; }
    }
  </style>
</head>
